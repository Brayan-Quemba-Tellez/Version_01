<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>¿Cuáles son tus hobbies:?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #11cb81 0%, #25fc66 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      color: #2c3e50;
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }

    p {
      text-align: center;
      color: #7f8c8d;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .hobbies-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 25px;
    }

    .hobby-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hobby-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .hobby-item label {
      font-size: 15px;
      color: #34495e;
      cursor: pointer;
      user-select: none;
    }

    .btn {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 20px;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #2980b9;
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* Estilo para checkboxes personalizados (opcional) */
    input[type="checkbox"]:checked + label {
      color: #2c3e50;
      font-weight: 600;
    }
  </style>
</head>
<body>
      <div class="container">
        <h1>¿Cuáles son tus hobbies?</h1>
    <p>Selecciona todos los que apliquen:</p>

    <form id="hobbiesForm">
      <div class="hobbies-list">
        <div class="hobby-item">
          <input type="checkbox" id="leer" name="hobby" value="Leer">
          <label for="leer">Leer</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="deporte" name="hobby" value="Deporte">
          <label for="deporte">Deporte</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="musica" name="hobby" value="Música">
          <label for="musica">Música</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="viajar" name="hobby" value="Viajar">
          <label for="viajar">Viajar</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="cocinar" name="hobby" value="Cocinar">
          <label for="cocinar">Cocinar</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="juegos" name="hobby" value="Videojuegos">
          <label for="juegos">Videojuegos</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="arte" name="hobby" value="Arte">
          <label for="arte">Arte</label>
        </div>
        <div class="hobby-item">
          <input type="checkbox" id="naturaleza" name="hobby" value="Naturaleza">
          <label for="naturaleza">Naturaleza</label>
        </div>
      </div>

      <button type="submit" class="btn">Enviar selección</button>
    </form>
  </div>

  <script>
    document.getElementById('hobbiesForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const selected = [];
      document.querySelectorAll('input[name="hobby"]:checked').forEach(checkbox => {
        selected.push(checkbox.value);
      });

      if (selected.length === 0) {
        alert('Por favor, selecciona al menos un hobby.');
        return;
      }

      alert('Tus hobbies seleccionados:\n' + selected.join(', '));
      // Aquí podrías enviar los datos a un servidor con fetch()
    });
  </script>
</body>
</html>
